name: Generate Snake
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch: {}
  push: {branches: [main]}
permissions: {contents: write}
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - {name: Generate snake svg, uses: Platane/snk@v3, with: {github_user_name: ioott, outputs: "dist/github-contribution-grid-snake.svg\ndist/github-contribution-grid-snake-dark.svg?palette=github-dark"}}
      - name: Push snake output
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with: {target_branch: output, build_dir: dist}
        env: {GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"}
